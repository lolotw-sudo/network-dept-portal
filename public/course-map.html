<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>115 網路學系 學習地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05080f;
  --bg2:#0a101e;
  --panel:rgba(16,24,42,.72);
  --line:rgba(120,180,255,.14);
  --txt:#dce8ff;
  --dim:#7d8db0;
  --accent:#00e5ff;
  --lv-basic:#3ddc84;
  --lv-adv:#ffb648;
  --lv-pro:#ff5d8f;
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  background:var(--bg);
  color:var(--txt);
  font-family:'Noto Sans TC',system-ui,sans-serif;
  overflow-x:hidden;
}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    linear-gradient(rgba(0,229,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,.025) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse at 50% 38%,#000 30%,transparent 78%);
}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ---------- header ---------- */
header{
  display:flex;align-items:center;gap:22px;flex-wrap:wrap;
  padding:18px 32px;
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(8px);
  background:linear-gradient(180deg,rgba(8,13,26,.85),rgba(8,13,26,.4));
  position:sticky;top:0;z-index:50;
}
.brand{display:flex;align-items:center;gap:14px;cursor:pointer}
.brand .mark{
  width:40px;height:40px;border-radius:10px;flex:none;
  background:conic-gradient(from 210deg,#00e5ff,#2f7bff,#7c6cff,#00e5ff);
  position:relative;box-shadow:0 0 22px rgba(0,229,255,.45);
}
.brand .mark::after{content:"";position:absolute;inset:3px;border-radius:8px;background:var(--bg);
  background-image:radial-gradient(circle at 30% 30%,rgba(0,229,255,.5),transparent 60%)}
.brand h1{font-size:19px;font-weight:900;letter-spacing:1px;line-height:1.15}
.brand h1 small{display:block;font-family:'Rajdhani';font-size:11px;font-weight:600;letter-spacing:4px;color:var(--accent);text-transform:uppercase}
.statchips{display:flex;gap:10px;flex-wrap:wrap}
.chip{
  font-family:'Rajdhani';font-weight:600;font-size:13px;letter-spacing:1px;
  padding:6px 14px;border:1px solid var(--line);border-radius:999px;color:var(--dim);
  background:rgba(255,255,255,.02);white-space:nowrap;
}
.chip b{color:var(--txt);font-size:15px;margin-right:3px}
.searchbox{margin-left:auto;position:relative}
.searchbox input{
  width:250px;padding:9px 16px 9px 38px;border-radius:999px;
  border:1px solid var(--line);background:rgba(10,18,34,.8);color:var(--txt);
  font-family:inherit;font-size:13px;outline:none;transition:.25s;
}
.searchbox input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,229,255,.12);width:300px}
.searchbox svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5}

/* ---------- views ---------- */
.view{flex:1;display:none;animation:fadeIn .45s cubic-bezier(.2,.8,.2,1)}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* ---------- overview : L1/L2 matrix ---------- */
#overview{padding:38px 40px 26px;min-height:calc(100vh - 160px)}
.view.active#overview{display:flex;flex-direction:column}
.ov-title{text-align:center;margin-bottom:34px}
.ov-title .en{font-family:'Rajdhani';font-size:12px;font-weight:600;letter-spacing:6px;color:var(--accent)}
.ov-title h2{font-size:26px;font-weight:900;letter-spacing:3px;margin-top:4px}
.ov-title .sub{font-size:12.5px;color:var(--dim);letter-spacing:2px;margin-top:8px}
.matrix{
  display:grid;gap:13px;max-width:1560px;width:100%;margin:0 auto;
  grid-template-columns:44px repeat(4,1fr) 1.9fr 1.1fr 1.5fr;
}
.lvlab{
  display:flex;align-items:center;justify-content:center;border-radius:10px;
  border:1px dashed rgba(120,180,255,.22);color:var(--dim);
  font-family:'Rajdhani';font-weight:700;letter-spacing:4px;font-size:12px;
  writing-mode:vertical-rl;text-orientation:mixed;padding:14px 0;
}
.tile{opacity:0;transform:translateY(14px);animation:tileIn .5s cubic-bezier(.2,.8,.2,1) forwards}
@keyframes tileIn{to{opacity:1;transform:none}}
.l1tile{
  cursor:pointer;border:1px solid var(--c);border-radius:12px;padding:17px 10px;
  text-align:center;position:relative;overflow:hidden;transition:.25s;
  background:linear-gradient(160deg,var(--g),rgba(11,17,33,.92) 70%);
}
.l1tile::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--c);box-shadow:0 0 14px var(--c)}
.l1tile .idx{font-family:'Rajdhani';font-weight:700;font-size:11px;letter-spacing:3px;color:var(--c)}
.l1tile .nm{font-weight:900;font-size:16.5px;letter-spacing:1px;line-height:1.35;margin-top:3px}
.l1tile:hover{transform:translateY(-4px);box-shadow:0 10px 34px var(--g)}
.netzone{grid-column:2/6;display:grid;grid-template-columns:repeat(4,1fr);gap:13px;align-content:start}
.colstack{display:grid;gap:13px;align-content:start}
.colstack.two{grid-template-columns:1fr 1fr}
.l2tile{
  cursor:pointer;border:1px solid var(--line);border-left:3px solid var(--c);border-radius:10px;
  padding:11px 13px;font-size:13.5px;display:flex;align-items:center;gap:9px;min-height:54px;
  background:rgba(14,21,40,.62);transition:.22s;color:var(--txt);line-height:1.35;
}
.l2tile .no{font-family:'Rajdhani';color:var(--c);font-weight:700;font-size:12.5px;flex:none}
.l2tile:hover{border-color:var(--c);background:var(--g);transform:translateX(4px);box-shadow:0 4px 18px var(--g)}
.l2tile.span{
  grid-column:1/-1;justify-content:center;border-left:none;font-weight:700;letter-spacing:2px;
  border:1px solid rgba(0,229,255,.4);
  background:linear-gradient(90deg,rgba(0,229,255,.13),rgba(124,108,255,.13),rgba(255,182,72,.13),rgba(47,123,255,.13));
}
.l2tile.span:hover{transform:translateY(-3px);box-shadow:0 6px 24px rgba(0,229,255,.18)}
.l2tile.span .no{color:var(--accent)}
.ov-hint{
  margin:34px auto 0;font-size:12px;color:var(--dim);letter-spacing:3px;
  display:flex;align-items:center;gap:10px;justify-content:center;
}
.ov-hint .pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);
  box-shadow:0 0 0 0 rgba(0,229,255,.6);animation:pulse 2s infinite}
@keyframes pulse{70%{box-shadow:0 0 0 12px rgba(0,229,255,0)}100%{box-shadow:0 0 0 0 rgba(0,229,255,0)}}

/* mobile overview grid */
.ov-grid{display:none;padding:6px 0;gap:14px;grid-template-columns:1fr}
.ovcard{border:1px solid var(--line);border-radius:var(--r);padding:18px;background:var(--panel)}
.ovcard .idx{font-family:'Rajdhani';font-size:11px;letter-spacing:3px}
.ovcard .nm{font-weight:900;font-size:17px;margin:4px 0 12px;cursor:pointer}
.ovcard .chips{display:flex;flex-wrap:wrap;gap:8px}
.ovcard .chips .l2tile{min-height:0;padding:8px 13px;font-size:12.5px}

/* ---------- domain view ---------- */
#domain{padding:26px 38px 70px}
.crumbs{display:flex;align-items:center;gap:10px;font-family:'Rajdhani';font-weight:600;
  font-size:14px;letter-spacing:2px;color:var(--dim);margin-bottom:22px}
.crumbs a{color:var(--dim);text-decoration:none;cursor:pointer;transition:.2s}
.crumbs a:hover{color:var(--accent)}
.crumbs .sep{opacity:.4}
.crumbs .cur{color:var(--txt)}
.backbtn{
  display:inline-flex;align-items:center;gap:8px;cursor:pointer;
  font-size:13px;letter-spacing:1px;color:var(--dim);
  border:1px solid var(--line);border-radius:999px;padding:7px 18px;margin-right:8px;
  transition:.25s;background:rgba(255,255,255,.02);
}
.backbtn:hover{color:var(--accent);border-color:var(--accent);transform:translateX(-3px)}

.dhead{
  position:relative;border-radius:var(--r);padding:30px 34px;margin-bottom:26px;overflow:hidden;
  background:var(--panel);border:1px solid var(--line);
}
.dhead::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--dc)}
.dhead::after{content:"";position:absolute;right:-60px;top:-80px;width:340px;height:340px;border-radius:50%;
  background:radial-gradient(circle,var(--dc-glow),transparent 70%);pointer-events:none}
.dhead .row{display:flex;align-items:flex-end;gap:26px;flex-wrap:wrap;position:relative;z-index:1}
.dhead .code{font-family:'Rajdhani';font-weight:700;font-size:15px;letter-spacing:5px;color:var(--dc)}
.dhead h2{font-size:34px;font-weight:900;letter-spacing:2px;line-height:1.1}
.dstats{display:flex;gap:30px;margin-left:auto;flex-wrap:wrap}
.dstat{text-align:center}
.dstat .v{font-family:'Rajdhani';font-weight:700;font-size:30px;color:var(--dc);line-height:1}
.dstat .k{font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:4px}
.dlvbar{position:relative;z-index:1;margin-top:20px;display:flex;height:8px;border-radius:4px;overflow:hidden;background:rgba(255,255,255,.06)}
.dlvbar i{height:100%;transition:width .8s cubic-bezier(.2,.8,.2,1)}
.dlvlabels{display:flex;gap:22px;margin-top:9px;font-size:12px;color:var(--dim)}
.dlvlabels b{color:var(--txt);font-family:'Rajdhani';font-size:14px}

.l2pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.pill{
  cursor:pointer;padding:10px 22px;border-radius:999px;border:1px solid var(--line);
  background:rgba(255,255,255,.025);font-size:14px;font-weight:500;letter-spacing:1px;
  color:var(--dim);transition:.25s;display:flex;align-items:center;gap:9px;
}
.pill .n{font-family:'Rajdhani';font-weight:700;font-size:13px;opacity:.8}
.pill:hover{color:var(--txt);border-color:var(--dc);transform:translateY(-2px)}
.pill.on{color:#04101c;background:var(--dc);border-color:var(--dc);font-weight:700;
  box-shadow:0 4px 22px var(--dc-glow)}

.filters{display:flex;gap:8px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
.filters .lab{font-size:12px;color:var(--dim);letter-spacing:2px;margin-right:4px}
.fchip{cursor:pointer;font-size:12px;padding:6px 15px;border-radius:999px;border:1px solid var(--line);
  color:var(--dim);transition:.2s;letter-spacing:1px}
.fchip:hover{color:var(--txt)}
.fchip.on{color:#04101c;font-weight:700}
.fchip[data-lv="全部"].on{background:var(--txt);border-color:var(--txt)}
.fchip[data-lv="基礎"].on{background:var(--lv-basic);border-color:var(--lv-basic)}
.fchip[data-lv="進階"].on{background:var(--lv-adv);border-color:var(--lv-adv)}
.fchip[data-lv="專業"].on{background:var(--lv-pro);border-color:var(--lv-pro)}

.l2meta{
  border:1px solid var(--line);border-radius:var(--r);padding:18px 24px;margin-bottom:22px;
  background:linear-gradient(120deg,rgba(255,255,255,.03),transparent 60%);
  display:flex;gap:34px;flex-wrap:wrap;font-size:13px;
}
.l2meta .item{min-width:200px;flex:1}
.l2meta .k{font-size:11px;letter-spacing:2px;color:var(--dim);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.l2meta .k i{width:6px;height:6px;border-radius:50%;background:var(--dc);box-shadow:0 0 8px var(--dc)}
.l2meta .v{line-height:1.7;color:var(--txt)}

/* L3 sections */
.l3sec{margin-bottom:30px}
.l3title{
  display:flex;align-items:center;gap:14px;margin-bottom:14px;
  font-size:17px;font-weight:900;letter-spacing:2px;
}
.l3title::before{content:"";width:22px;height:2px;background:var(--dc);box-shadow:0 0 10px var(--dc)}
.l3title .cnt{font-family:'Rajdhani';font-weight:700;font-size:13px;color:var(--dc);letter-spacing:1px}
.l3meta{font-size:12px;color:var(--dim);margin:-6px 0 14px 36px;line-height:1.8}
.l3meta b{color:#a9bcdf;font-weight:500}

/* group accordion */
.grp{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;
  background:rgba(12,19,36,.55);transition:border-color .25s}
.grp:hover{border-color:rgba(120,180,255,.3)}
.grp.open{border-color:var(--dc)}
.grp-h{
  display:flex;align-items:center;gap:14px;padding:15px 20px;cursor:pointer;user-select:none;
  transition:background .2s;
}
.grp-h:hover{background:rgba(255,255,255,.03)}
.grp-h .arrow{width:22px;height:22px;border-radius:6px;flex:none;display:grid;place-items:center;
  border:1px solid var(--line);transition:.3s;font-size:11px;color:var(--dc)}
.grp.open .grp-h .arrow{transform:rotate(90deg);border-color:var(--dc);background:rgba(0,229,255,.08)}
.grp-h .gname{font-weight:700;letter-spacing:1px;font-size:15px}
.grp-h .gcnt{font-family:'Rajdhani';font-weight:600;font-size:13px;color:var(--dim);margin-left:auto;letter-spacing:1px}
.grp-h .minibar{display:flex;width:80px;height:4px;border-radius:2px;overflow:hidden;background:rgba(255,255,255,.07)}
.grp-h .minibar i{height:100%}
.grp-b{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.2,.8,.2,1)}
.grp.open .grp-b{max-height:4000px}
.clist{padding:4px 14px 14px}

.crow{
  display:flex;align-items:center;gap:13px;padding:11px 14px;border-radius:9px;
  border-left:2px solid transparent;transition:.2s;position:relative;
}
.crow:hover{background:rgba(255,255,255,.04);border-left-color:var(--dc);transform:translateX(5px)}
.crow .lv{flex:none;width:44px;text-align:center;font-size:11px;font-weight:700;letter-spacing:1px;
  padding:4px 0;border-radius:5px}
.lv.基礎{color:var(--lv-basic);background:rgba(61,220,132,.12);border:1px solid rgba(61,220,132,.35)}
.lv.進階{color:var(--lv-adv);background:rgba(255,182,72,.12);border:1px solid rgba(255,182,72,.35)}
.lv.專業{color:var(--lv-pro);background:rgba(255,93,143,.12);border:1px solid rgba(255,93,143,.35)}
.lv.未判讀{color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line)}
.crow .cname{font-size:14px;flex:1;line-height:1.5}
.crow .tags{display:flex;gap:6px;flex:none;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid var(--line);color:var(--dim);letter-spacing:1px;white-space:nowrap}
.tag.hours{font-family:'Rajdhani';font-weight:600;color:#a9bcdf}
.tag.digital{color:var(--accent);border-color:rgba(0,229,255,.4);background:rgba(0,229,255,.07)}
.tag.new{color:#ffd166;border-color:rgba(255,209,102,.45);background:rgba(255,209,102,.08);animation:newpulse 2.2s infinite}
@keyframes newpulse{50%{box-shadow:0 0 12px rgba(255,209,102,.35)}}
.crow.hidden{display:none}
.empty{padding:30px;text-align:center;color:var(--dim);font-size:13px;letter-spacing:2px}

/* ---------- search results ---------- */
#searchres{
  position:fixed;top:78px;right:32px;width:480px;max-width:calc(100vw - 40px);max-height:62vh;overflow:auto;
  background:rgba(10,16,30,.97);border:1px solid var(--line);border-radius:var(--r);z-index:99;
  box-shadow:0 18px 60px rgba(0,0,0,.6);display:none;backdrop-filter:blur(10px);
}
#searchres.show{display:block;animation:fadeIn .25s}
#searchres .sr-h{padding:12px 18px;font-size:12px;color:var(--dim);letter-spacing:2px;border-bottom:1px solid var(--line)}
.sr-item{padding:12px 18px;cursor:pointer;transition:.15s;border-bottom:1px solid rgba(120,180,255,.06)}
.sr-item:hover{background:rgba(0,229,255,.06)}
.sr-item .p{font-size:11px;color:var(--dim);letter-spacing:1px;margin-bottom:3px}
.sr-item .n{font-size:13.5px;display:flex;align-items:center;gap:9px}
.sr-item .n .dot{width:8px;height:8px;border-radius:50%;flex:none}

footer{padding:18px 32px;border-top:1px solid var(--line);font-size:11.5px;color:var(--dim);
  letter-spacing:1px;display:flex;gap:20px;flex-wrap:wrap;position:relative;z-index:1}

::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:rgba(120,180,255,.18);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}

@media(max-width:860px){
  header{padding:14px 18px;gap:12px}
  .searchbox{margin-left:0;width:100%}
  .searchbox input{width:100%}
  .searchbox input:focus{width:100%}
  #overview{padding:24px 18px}
  .matrix{display:none}
  .ov-grid{display:grid}
  #domain{padding:18px 16px 60px}
  .dhead{padding:20px}
  .dhead h2{font-size:24px}
  .dstats{gap:18px}
  .crow{flex-wrap:wrap}
  .crow .tags{justify-content:flex-start}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="grid-overlay"></div>
<div class="app">

<header>
  <div class="brand" onclick="goHome()">
    <div class="mark"></div>
    <h1>115 網路學系 學習地圖<small>NETWORK ACADEMY · COURSE MAP</small></h1>
  </div>
  <div class="searchbox">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#dce8ff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    <input id="q" type="text" placeholder="搜尋課程名稱…" autocomplete="off">
  </div>
</header>

<section id="overview" class="view active">
  <div class="ov-title">
    <div class="en">NETWORK ACADEMY · COURSE MAP</div>
    <h2>七大領域 × 專業子分類</h2>
    <div class="sub">Level 1 領域 — Level 2 專業子分類 全覽</div>
  </div>
  <div class="matrix" id="matrix"></div>
  <div class="ov-grid" id="ovgrid"></div>
  <div class="ov-hint"><span class="pulse"></span>點擊領域或子分類 進入課程地圖</div>
</section>

<section id="domain" class="view"></section>

<div id="searchres"></div>

<footer>
  <span>資料來源：115網路學系_學習地圖_全課程列式整理.xlsx（16 張學習地圖 · 358 筆課程）</span>
  <span>難度依原學習地圖「基礎／進階／專業」區塊位置判讀</span>
</footer>

function clickL2(domain,label){
  if(label==='單一彙集'){ openDomain('固網','單一彙集'); return; }
  const d=tree[domain];
  openDomain(domain, d && d.l2[label] ? label : undefined);
}
let TILE_I=0;
function tileStyle(name){
  const [c,g]=DCOLORS[name];
  return `--c:${c};--g:${g};animation-delay:${60+(TILE_I++)*45}ms`;
}
function l2tileHTML(domain,label,no,extraCls){
  return `<div class="l2tile tile ${extraCls||''}" style="${tileStyle(domain)}"
    onclick="clickL2('${domain}','${label}')"><span class="no">${no}.</span>${label}</div>`;
}
function renderOverview(){
  TILE_I=0;
  const m=document.getElementById('matrix');
  let html=`<div class="lvlab">LEVEL 1 領域</div>`;
  DOMAIN_ORDER.forEach((name,i)=>{
    html+=`<div class="l1tile tile" style="${tileStyle(name)}" onclick="openDomain('${name}')">
      <div class="idx">0${i+1}</div><div class="nm">${name}</div></div>`;
  });
  html+=`<div class="lvlab">LEVEL 2 專業子分類</div>`;
  // 固網～海纜：接取 ×4 ／ 單一彙集（橫跨）／ 核心 ×4
  html+=`<div class="netzone">`;
  OV_NET.forEach(n=>html+=l2tileHTML(n,'接取',1));
  html+=`<div class="l2tile tile span" style="animation-delay:${60+(TILE_I++)*45}ms"
    onclick="clickL2('固網','單一彙集')"><span class="no">2.</span>單一彙集</div>`;
  OV_NET.forEach(n=>html+=l2tileHTML(n,'核心',3));
  html+=`</div>`;
  // EdgeAI（雙欄）、ESG、全網韌性設施
  [['智慧科技 – EdgeAI','two'],['環境永續 - ESG',''],['全網韌性設施','']].forEach(([name,cls])=>{
    html+=`<div class="colstack ${cls}">`;
    OV_L2[name].forEach((l2,j)=>html+=l2tileHTML(name,l2,j+1));
    html+=`</div>`;
  });
  m.innerHTML=html;
  // mobile cards
  const grid=document.getElementById('ovgrid'); grid.innerHTML='';
  DOMAIN_ORDER.forEach((name,i)=>{
    const [c,g]=DCOLORS[name];
    const card=document.createElement('div');
    card.className='ovcard';
    card.style.borderLeft=`3px solid ${c}`;
    card.innerHTML=`<div class="idx" style="color:${c}">LEVEL 1 · 0${i+1}</div>
      <div class="nm" onclick="openDomain('${name}')">${name}</div>
      <div class="chips">${OV_L2[name].map((l2,j)=>
        `<div class="l2tile" style="--c:${c};--g:${g}" onclick="clickL2('${name}','${l2}')"><span class="no">${j+1}.</span>${l2}</div>`).join('')}</div>`;
    grid.appendChild(card);
  });
}

/* ---------- domain view ---------- */
function openDomain(name, l2Pick, highlight){
  state.domain=name;
  const d=tree[name];
  const l2names=Object.keys(d.l2);
  state.l2 = l2Pick && d.l2[l2Pick] ? l2Pick : l2names[0];
  state.filter='全部';
  const [c,glow]=DCOLORS[name];
  const idx=DOMAIN_ORDER.indexOf(name)+1;
  const sec=document.getElementById('domain');
  sec.style.setProperty('--dc',c);
  sec.style.setProperty('--dc-glow',glow);
  sec.innerHTML=`
    <div class="crumbs">
      <span class="backbtn" onclick="goHome()">◂ 返回總覽</span>
      <a onclick="goHome()">學習地圖</a><span class="sep">/</span>
      <span class="cur">${name}</span>
    </div>
    <div class="dhead">
      <div class="row">
        <div>
          <div class="code">DOMAIN 0${idx}</div>
          <h2>${name}</h2>
        </div>
        <div class="dstats">
          <div class="dstat"><div class="v">${d.count}</div><div class="k">課程總數</div></div>
          <div class="dstat"><div class="v">${l2names.length}</div><div class="k">專業子領域</div></div>
          <div class="dstat"><div class="v" style="color:var(--lv-basic)">${d.lv['基礎']||0}</div><div class="k">基礎</div></div>
          <div class="dstat"><div class="v" style="color:var(--lv-adv)">${d.lv['進階']||0}</div><div class="k">進階</div></div>
          <div class="dstat"><div class="v" style="color:var(--lv-pro)">${d.lv['專業']||0}</div><div class="k">專業</div></div>
        </div>
      </div>
      <div class="dlvbar">${lvbarHTML(d.lv,d.count)}</div>
    </div>
    <div class="l2pills" id="l2pills"></div>
    <div class="filters">
      <span class="lab">難度篩選</span>
      ${['全部','基礎','進階','專業'].map(lv=>`<span class="fchip ${lv==='全部'?'on':''}" data-lv="${lv}" onclick="setFilter('${lv}')">${lv}</span>`).join('')}
    </div>
    <div id="l2content"></div>`;
  const pills=document.getElementById('l2pills');
  l2names.forEach(n=>{
    const p=document.createElement('span');
    p.className='pill'+(n===state.l2?' on':'');
    p.innerHTML=`${n}<span class="n">${d.l2[n].count}</span>`;
    p.onclick=()=>{state.l2=n;state.filter='全部';
      pills.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));
      p.classList.add('on');
      document.querySelectorAll('.fchip').forEach(x=>x.classList.toggle('on',x.dataset.lv==='全部'));
      renderL2();};
    pills.appendChild(p);
  });
  switchView('domain');
  renderL2(highlight);
}

function metaBlock(trainers,contacts,extra){
  return `<div class="l2meta">
    <div class="item"><div class="k"><i></i>負責培訓師</div><div class="v">${[...trainers].join('<br>')||'—'}</div></div>
    <div class="item"><div class="k"><i></i>事業單位窗口</div><div class="v">${[...contacts].join('<br>')||'—'}</div></div>
    ${extra||''}
  </div>`;
}

function renderL2(highlight){
  const d=tree[state.domain], l2=d.l2[state.l2];
  const box=document.getElementById('l2content');
  const l3names=Object.keys(l2.l3);
  const showL3 = l3names.length>1 || (l3names[0]!=='通用/未標示');
  let html='';
  // L2-level meta only if single L3 (otherwise meta per L3 section)
  const multiTrainer = l3names.length>1;
  if(!multiTrainer){
    html+=metaBlock(l2.l3[l3names[0]].trainers, l2.l3[l3names[0]].contacts,
      `<div class="item"><div class="k"><i></i>學習地圖</div><div class="v">原始 PPT 第 ${[...l2.pages].sort((a,b)=>a-b).join('、')} 頁</div></div>`);
  }
  l3names.forEach(l3n=>{
    const l3=l2.l3[l3n];
    html+=`<div class="l3sec">`;
    if(showL3){
      html+=`<div class="l3title">${l3n}<span class="cnt">${l3.count} 門</span></div>`;
      if(multiTrainer){
        html+=`<div class="l3meta">培訓師：<b>${[...l3.trainers].join(' ／ ')||'—'}</b>　·　窗口：<b>${[...l3.contacts].join(' ／ ')||'—'}</b></div>`;
      }
    }
    // groups by 專業細分類
    const gnames=Object.keys(l3.grps);
    gnames.forEach(gn=>{
      const g=l3.grps[gn];
      html+=grpHTML(gn, g.courses, g.lv, highlight);
    });
    html+=`</div>`;
  });
  box.innerHTML=html;
  applyFilterDOM();
  if(highlight){
    const el=box.querySelector(`[data-course="${CSS.escape(highlight)}"]`);
    if(el){
      el.closest('.grp')?.classList.add('open');
      setTimeout(()=>{el.scrollIntoView({behavior:'smooth',block:'center'});
        el.style.background='rgba(0,229,255,.12)';
        setTimeout(()=>el.style.background='',1800);},150);
    }
  }
}

let GRP_ID=0;
function grpHTML(name,courses,lv,highlight){
  const id='g'+(GRP_ID++);
  const open = courses.some(c=>c.course===highlight);
  const rows=courses.slice().sort((a,b)=>LV_ORDER[a.level]-LV_ORDER[b.level]).map(c=>{
    let tags='';
    if(c.hours) tags+=`<span class="tag hours">${c.hours}</span>`;
    if(c.classType) tags+=`<span class="tag">${c.classType}</span>`;
    if(c.feature && c.feature!=='—'){
      c.feature.split('；').forEach(f=>{
        if(f.includes('數位')) tags+=`<span class="tag digital">數位課程</span>`;
        if(f.includes('新增')) tags+=`<span class="tag new">本年新增</span>`;
      });
    }
    return `<div class="crow" data-lv="${c.level}" data-course="${esc(c.course)}">
      <span class="lv ${c.level}">${c.level}</span>
      <span class="cname">${esc(c.course)}</span>
      <span class="tags">${tags}</span></div>`;
  }).join('');
  return `<div class="grp ${open?'open':''}" id="${id}">
    <div class="grp-h" onclick="this.parentElement.classList.toggle('open')">
      <span class="arrow">▸</span>
      <span class="gname">${esc(name)}</span>
      <span class="minibar">${lvbarHTML(lv,courses.length)}</span>
      <span class="gcnt">${courses.length} 門</span>
    </div>
    <div class="grp-b"><div class="clist">${rows}</div></div>
  </div>`;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}

function setFilter(lv){
  state.filter=lv;
  document.querySelectorAll('.fchip').forEach(x=>x.classList.toggle('on',x.dataset.lv===lv));
  applyFilterDOM();
}
function applyFilterDOM(){
  const lv=state.filter;
  document.querySelectorAll('#l2content .crow').forEach(r=>{
    r.classList.toggle('hidden', lv!=='全部' && r.dataset.lv!==lv);
  });
  document.querySelectorAll('#l2content .grp').forEach(g=>{
    const vis=g.querySelectorAll('.crow:not(.hidden)').length;
    g.style.display = vis? '':'none';
    if(lv!=='全部' && vis) g.classList.add('open');
  });
}

/* ---------- navigation ---------- */
function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0});
}
function goHome(){state.domain=null;switchView('overview');renderOverview();}

/* ---------- search ---------- */
const q=document.getElementById('q'), sres=document.getElementById('searchres');
q.addEventListener('input',()=>{
  const v=q.value.trim();
  if(v.length<1){sres.classList.remove('show');return;}
  const hits=RAW.filter(r=>r.course.includes(v) || (r.subCat&&r.subCat.includes(v))).slice(0,40);
  if(!hits.length){sres.innerHTML=`<div class="sr-h">找不到符合「${esc(v)}」的課程</div>`;sres.classList.add('show');return;}
  sres.innerHTML=`<div class="sr-h">找到 ${hits.length} 門課程</div>`+hits.map((r,i)=>`
    <div class="sr-item" data-i="${i}">
      <div class="p">${esc(r.L1)} ／ ${esc(r.L2)}${r.L3&&r.L3!=='通用/未標示'?' ／ '+esc(r.L3):''}</div>
      <div class="n"><span class="dot" style="background:${LV_COLOR[r.level]}"></span>${esc(r.course)}</div>
    </div>`).join('');
  sres.querySelectorAll('.sr-item').forEach(el=>{
    el.onclick=()=>{
      const r=hits[+el.dataset.i];
      sres.classList.remove('show'); q.value='';
      openDomain(r.L1, r.L2, r.course);
    };
  });
  sres.classList.add('show');
});
document.addEventListener('click',e=>{
  if(!sres.contains(e.target)&&e.target!==q) sres.classList.remove('show');
});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){sres.classList.remove('show');q.blur();}});

/* ---------- particle bg ---------- */
(function(){
  const cv=document.getElementById('bg'), ctx=cv.getContext('2d');
  let W,H,pts=[];
  function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  resize(); addEventListener('resize',resize);
  const N=Math.min(70,Math.round(innerWidth/22));
  for(let i=0;i<N;i++)pts.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.32,vy:(Math.random()-.5)*.32});
  const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
  function frame(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0||p.x>W)p.vx*=-1; if(p.y<0||p.y>H)p.vy*=-1;
    });
    for(let i=0;i<pts.length;i++){
      const a=pts[i];
      ctx.fillStyle='rgba(0,229,255,.35)';
      ctx.fillRect(a.x-1,a.y-1,2,2);
      for(let j=i+1;j<pts.length;j++){
        const b=pts[j],dx=a.x-b.x,dy=a.y-b.y,dd=dx*dx+dy*dy;
        if(dd<150*150){
          ctx.strokeStyle=`rgba(0,180,255,${(1-dd/22500)*.10})`;
          ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
        }
      }
    }
    if(!reduced)requestAnimationFrame(frame);
  }
  frame();
})();

renderOverview();
</script>
